<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finanças.DuC V00.018</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer onload="inicializarGoogleAuth()"></script>
<style>
  :root{
    --bg: #14161a;
    --surface: #1c1f24;
    --surface-2: #23272d;
    --line: #2d3138;
    --text: #e9e6df;
    --text-dim: #8f95a0;
    --amber: #d9a13a;
    --green: #5fae84;
    --red: #d9685c;
  }
  *{ box-sizing: border-box; }
  body{
    margin:0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap{ max-width: 880px; margin: 0 auto; padding: 28px 20px 80px; }
  header{ margin-bottom: 22px; }
  .header-topo{ display:flex; align-items:center; justify-content:space-between; gap: 12px; }
  h1{
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 1.6rem;
    margin: 0;
    letter-spacing: -0.01em;
  }
  h1 .tick{ color: var(--amber); }
  .h1-financas{ display:flex; align-items:baseline; gap: 6px; }
  .h1-nome{ color: var(--text); }
  .h1-logo{ height: 0.72em; width: auto; display:block; }
  .h1-versao{ font-family: 'JetBrains Mono', monospace; font-size: 0.78rem; font-weight: 500; color: #c4c8cf; letter-spacing: 0.04em; align-self: flex-end; padding-bottom: 3px; }
  .subtitulo{ color: var(--text-dim); font-size: 0.85rem; margin-top: 4px; }

  .btn-config{
    flex-shrink: 0;
    width: 38px;
    height: 38px;
    border-radius: 8px;
    background: transparent;
    border: 1px solid var(--line);
    color: var(--text-dim);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    padding: 0;
  }
  .btn-config:hover{ color: var(--amber); border-color: var(--amber); }
  .btn-config svg{ width: 19px; height: 19px; }

  .modal-overlay{
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 1000;
  }
  .modal-overlay.aberto{ display: flex; }
  .modal{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 20px;
    width: 100%;
    max-width: 460px;
    max-height: 85vh;
    overflow-y: auto;
  }
  .modal-cabecalho{ display:flex; align-items:center; justify-content:space-between; margin-bottom: 16px; }
  .modal-cabecalho h2{ font-family: 'Fraunces', serif; font-size: 1.1rem; margin: 0; color: var(--amber); }
  .modal-fechar{ background: none; border: none; color: var(--text-dim); font-size: 1.05rem; cursor: pointer; padding: 4px; }
  .modal label{ font-size: 0.72rem; color: var(--text-dim); display: block; margin-bottom: 6px; }
  .modal input{
    width: 100%;
    background: var(--surface-2);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 10px;
    border-radius: 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    margin-bottom: 16px;
  }
  .modal-dica{ font-size: 0.76rem; color: var(--text-dim); margin: -10px 0 16px; line-height: 1.5; }
  .modal-dica code{ color: var(--amber); }
  .lista-passos{ margin: 0 0 16px; padding-left: 20px; font-size: 0.82rem; line-height: 1.7; color: var(--text); }
  .lista-passos li{ margin-bottom: 4px; }
  .lista-passos code{ color: var(--amber); font-family: 'JetBrains Mono', monospace; font-size: 0.78rem; }

  .modal-tabs{ display:flex; background: var(--surface-2); border:1px solid var(--line); border-radius:10px; padding:4px; margin-bottom:18px; gap:4px; }
  .modal-tab-btn{ flex:1; text-align:center; padding:7px 0; border-radius:7px; background:transparent; border:none; color:var(--text-dim); font-size:0.76rem; cursor:pointer; font-family:inherit; }
  .modal-tab-btn.ativo{ background: var(--surface); color: var(--amber); }
  .modal-conteudo{ display:none; }
  .modal-conteudo.ativo{ display:block; }

  .cat-secao{ margin-bottom: 20px; }
  .cat-secao-titulo{ display:flex; align-items:center; justify-content:space-between; font-size:0.84rem; margin-bottom:10px; }
  .cat-secao-titulo .bolinha{ margin-right:6px; }
  .cat-secao-titulo .bolinha.gastos{ color: var(--red); }
  .cat-secao-titulo .bolinha.ganhos{ color: var(--green); }
  .cat-add-btn{ background:transparent; border:1px solid var(--line); color: var(--amber); font-size:0.72rem; padding:4px 10px; border-radius:7px; cursor:pointer; font-family:inherit; }
  .cat-lista{ display:flex; flex-wrap:wrap; gap:8px; }
  .cat-chip{ display:flex; align-items:center; gap:6px; background: var(--surface-2); border:1px solid var(--line); border-radius:8px; padding:6px 6px 6px 10px; font-size:0.82rem; }
  .cat-chip button{ background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:0.8rem;padding:2px 4px; }
  .cat-chip button:hover{ color: var(--red); }
  .cat-vazio{ color: var(--text-dim); font-size: 0.8rem; }

  .dia-ref-grade{ display:grid; grid-template-columns: repeat(3,1fr); gap:8px; margin-bottom: 14px; }
  .dia-ref-item{ background: var(--surface-2); border:1px solid var(--line); border-radius:8px; padding:10px 6px; text-align:center; cursor:pointer; font-size:0.84rem; }
  .dia-ref-item .desc{ font-size:0.66rem; color:var(--text-dim); display:block; margin-top:2px; }
  .dia-ref-item.selecionado{ border-color:var(--amber); color:var(--amber); }
  .dia-ref-item.selecionado .desc{ color: var(--amber); opacity: 0.8; }
  .dia-ref-outro{ display:flex; align-items:center; gap:10px; margin-bottom:16px; }
  .dia-ref-outro label{ margin:0; flex-shrink:0; }
  .dia-ref-outro input{ width:70px; margin-bottom:0; }

  .cards{ display:grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 18px; }
  .card{ background: var(--surface); border: 1px solid var(--line); border-radius: 10px; padding: 16px 16px 14px; }
  .card .rotulo{ font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-dim); margin-bottom: 6px; }
  .card .num{
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(0.62rem, 3.2vw, 1.3rem);
    font-weight: 700;
    white-space: nowrap;
    letter-spacing: -0.02em;
  }
  .card.receitas .num{ color: var(--green); }
  .card.gastos .num{ color: var(--red); }
  .card.saldo .num.pos{ color: var(--amber); }
  .card.saldo .num.neg{ color: var(--red); }
  @media (max-width: 600px){
    .cards{ gap: 8px; }
    .card{ padding: 12px 10px 10px; }
    .card .rotulo{ font-size: 0.62rem; }
  }

  .tabs{
    display:flex;
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 16px;
    gap: 4px;
  }
  .tab-btn{
    flex:1;
    text-align:center;
    padding: 9px 0;
    border-radius: 7px;
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-size: 0.88rem;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
  }
  .tab-btn.ativo{ background: var(--surface); color: var(--amber); }

  .filtro-datas{ display:flex; gap: 10px; margin-bottom: 18px; }
  .filtro-datas div{ flex:1; }
  .filtro-datas label{ font-size: 0.72rem; color: var(--text-dim); display:block; margin-bottom: 4px; }
  .filtro-datas input{
    width:100%;
    background: var(--surface);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 8px 10px;
    border-radius: 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
  }

  .aba{ display:none; }
  .aba.ativa{ display:block; }

  .botoes-topo{ display:flex; gap: 10px; margin-bottom: 16px; }
  button{
    background: var(--amber);
    color: #1a1306;
    border: none;
    font-weight: 600;
    padding: 10px 16px;
    border-radius: 7px;
    cursor: pointer;
    font-size: 0.88rem;
    font-family: inherit;
  }
  button:hover{ filter: brightness(1.08); }
  button.outline{ background: transparent; color: var(--amber); border: 1px solid var(--amber); }
  button.secundario{ background: transparent; color: var(--text-dim); border: 1px solid var(--line); }
  button.full{ width:100%; }

  form{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 16px;
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 10px;
    margin-bottom: 18px;
  }
  form.escondido{ display:none; }
  form label{ font-size: 0.72rem; color: var(--text-dim); display:block; margin-bottom: 4px; }
  form input, form select{
    width: 100%;
    background: var(--surface-2);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 8px 10px;
    border-radius: 7px;
    font-family: inherit;
    font-size: 0.88rem;
  }
  form input[type="number"]{ font-family: 'JetBrains Mono', monospace; }
  .col-2{ grid-column: span 2; }
  .col-3{ grid-column: span 3; }
  .col-4{ grid-column: span 4; }
  .col-6{ grid-column: span 6; }
  @media (max-width: 600px){
    form{ grid-template-columns: repeat(2, 1fr); }
    .col-2, .col-3, .col-4, .col-6{ grid-column: 1 / -1; }
    .botoes-topo{ flex-direction: column; }
  }
  .check-linha{ display:flex; align-items:center; gap: 8px; font-size: 0.85rem; color: var(--text-dim); }
  .check-linha input{ width:auto; }
  .acoes-form{ display:flex; gap:10px; }

  .tabela-wrap{ overflow-x: auto; border-radius: 10px; }
  table{ width:100%; border-collapse: collapse; background: var(--surface); border: 1px solid var(--line); border-radius: 10px; }
  th, td{ text-align: left; padding: 10px 12px; font-size: 0.85rem; border-bottom: 1px solid var(--line); white-space: nowrap; }
  th{ color: var(--text-dim); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 500; }
  tr:last-child td{ border-bottom: none; }
  td.tick-cel{ width: 4px; padding: 0; }
  .tick-bar{ width: 4px; height: 100%; display:block; min-height: 32px; }
  .tick-bar.Receita{ background: var(--green); }
  .tick-bar.Despesa, .tick-bar.Pagar{ background: var(--red); }
  .tick-bar.Cobrar{ background: var(--green); }
  td.valor{ font-family: 'JetBrains Mono', monospace; text-align:right; }
  td.valor.Receita, td.valor.Cobrar{ color: var(--green); }
  td.valor.Despesa, td.valor.Pagar{ color: var(--red); }
  .valor.Cobrar{ color: var(--green); }
  .valor.Pagar{ color: var(--red); }
  .tag{ font-size: 0.68rem; padding: 2px 7px; border-radius: 99px; border: 1px solid var(--line); color: var(--text-dim); white-space: nowrap; }
  .tag.Concluído{ color: var(--green); border-color: var(--green); }
  .tag-pilha{ display:flex; flex-direction:column; gap:3px; align-items:flex-start; }
  .apagar-btn{ background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 0.95rem; padding: 2px 6px; }
  .apagar-btn:hover{ color: var(--red); }
  .vazio{ text-align:center; color: var(--text-dim); padding: 28px 20px; font-size: 0.85rem; line-height:1.6; white-space: normal; }

  .lembrete-item{
    display:flex; align-items:center; justify-content:space-between;
    background: var(--surface); border: 1px solid var(--line); border-radius: 8px;
    padding: 12px 14px; margin-bottom: 8px; font-size: 0.86rem;
  }
  .lembrete-info{ display:flex; align-items:center; gap:10px; }
  .lembrete-meta{ display:flex; flex-direction:column; gap:2px; }
  .lembrete-meta .desc{ font-weight: 500; }
  .lembrete-meta .venc{ font-size: 0.74rem; color: var(--text-dim); font-family:'JetBrains Mono', monospace; }
  .lembrete-acoes{ display:flex; align-items:center; gap:10px; }
  .status-btn{
    background: transparent; border: 1px solid var(--line); color: var(--text-dim);
    font-size: 0.72rem; padding: 4px 10px; border-radius: 99px; cursor:pointer; font-family: inherit;
  }
  .status-btn.Concluído{ color: var(--green); border-color: var(--green); }

  .oculto{ display:none !important; }

  /* ALTERADO: overlay de processamento — bloqueia tela com spinner, texto e cancelar */
  .overlay-processamento{
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 1100;
  }
  .overlay-processamento.aberto{ display: flex; }
  .processamento-caixa{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 28px 24px;
    width: 100%;
    max-width: 320px;
    text-align: center;
  }
  .spinner-processamento{
    width: 34px;
    height: 34px;
    margin: 0 auto 16px;
    border: 3px solid var(--line);
    border-top-color: var(--amber);
    border-radius: 50%;
    animation: girar-spinner 0.8s linear infinite;
  }
  @keyframes girar-spinner{ to{ transform: rotate(360deg); } }
  #texto-processamento{ color: var(--text); font-size: 0.86rem; line-height: 1.5; margin: 0 0 18px; }
  #btn-cancelar-processamento{ width: 100%; }
  .status-auto{ font-size:0.82rem; padding:11px 13px; border-radius:8px; margin:14px 0; line-height:1.55; }
  .status-auto.status-info{ background: var(--surface-2); color: var(--text-dim); border:1px solid var(--line); }
  .status-auto.status-sucesso{ background: rgba(95,174,132,0.12); color: var(--green); border:1px solid var(--green); }
  .status-auto.status-erro{ background: rgba(217,104,92,0.12); color: var(--red); border:1px solid var(--red); }
  .status-auto.status-aviso{ background: rgba(217,161,58,0.12); color: var(--amber); border:1px solid var(--amber); }
  .divisor-ou{ display:flex; align-items:center; gap:10px; margin:18px 0; color: var(--text-dim); font-size:0.74rem; text-transform:uppercase; letter-spacing:0.05em; }
  .divisor-ou::before, .divisor-ou::after{ content:''; flex:1; height:1px; background: var(--line); }

  .entrada-caixa{ max-width: 360px; margin: 60px auto 0; text-align: center; }
  .entrada-texto{ color: var(--text-dim); font-size: 0.9rem; margin-bottom: 20px; line-height: 1.5; }
  .lista-mesclagem{ text-align: left; margin-bottom: 16px; max-height: 280px; overflow-y: auto; }
  .item-mesclagem{ display:flex; align-items:center; gap:10px; padding:11px 13px; border:1px solid var(--line); border-radius:8px; margin-bottom:8px; background: var(--surface-2); }
  .item-mesclagem input{ width:auto; margin:0; flex-shrink:0; }
  .item-mesclagem-info{ display:flex; flex-direction:column; gap:2px; }
  .item-mesclagem-nome{ font-size:0.85rem; color: var(--text); }
  .item-mesclagem-data{ font-size:0.72rem; color: var(--text-dim); }

  .resumo-bloco{ margin-bottom: 22px; }
  .resumo-titulo{ font-size: 0.78rem; color: var(--text-dim); text-transform:uppercase; letter-spacing:0.05em; margin-bottom: 10px; }
  .barra-linha{ display:flex; align-items:center; gap: 10px; margin-bottom: 9px; font-size: 0.85rem; }
  .barra-rotulo{ width: 100px; flex-shrink:0; color: var(--text-dim); overflow:hidden; text-overflow:ellipsis; }
  .barra-fundo{ flex:1; background: var(--surface-2); border-radius: 6px; height: 18px; overflow:hidden; }
  .barra-preenchida{ height:100%; background: var(--amber); border-radius: 6px; }
  .barra-valor{ width: 100px; text-align:right; font-family:'JetBrains Mono', monospace; flex-shrink:0; }
</style>
</head>
